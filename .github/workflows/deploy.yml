name: Deploy Quan Cua Tui

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/quan-cua-tui

            echo "Backup DB"
            cp app.db app_backup_$(date +%Y%m%d_%H%M%S).db || true

            echo "Pull new code"
            git fetch origin
            git reset --hard origin/main

            echo "Install packages"
            npm install

            echo "Restart PM2"
            pm2 restart quan-cua-tui

            pm2 save